<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waffle Empire</title>
    <style>
        body { margin:0; font-family:Arial; background:#f4a261; overflow:hidden; }
        #game-container { display:flex; height:100vh; }
        #game-area { flex:1; position:relative; background:#f8f1e3; overflow:hidden; }
        canvas { display:block; image-rendering:pixelated; }
        #ui-panel { width:320px; background:rgba(255,255,255,0.97); box-shadow:-4px 0 15px rgba(0,0,0,0.2); overflow-y:auto; padding:12px; }
        .section { margin-bottom:18px; padding:12px; background:white; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
        button { background:#e76f51; color:white; border:none; padding:10px 14px; margin:4px 0; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; }
        button:hover { background:#f4a261; }
        button:disabled { background:#999; cursor:not-allowed; }
        #top-bar { position:absolute; top:8px; left:8px; background:rgba(38,70,83,0.9); color:white; padding:8px 14px; border-radius:8px; display:flex; gap:16px; font-weight:bold; z-index:10; }
        .popup { position:absolute; font-size:28px; font-weight:bold; pointer-events:none; text-shadow:0 2px 4px rgba(0,0,0,0.4); animation:popupAnim 1.8s forwards; }
        @keyframes popupAnim { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-120px);opacity:0} }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-area">
            <canvas id="game-canvas" width="960" height="620"></canvas>
            
            <div id="top-bar">
                <div>$<span id="money">150</span></div>
                <div id="waffle-count">🥞 <span id="waffles-bin">0</span>/30</div>
                <div>📦 <span id="boxes">0</span></div>
            </div>
            
            <div style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(38,70,83,0.9);color:white;padding:6px 16px;border-radius:30px;font-size:15px;z-index:10;" id="bin-label">Collection Bin</div>
        </div>

        <div id="ui-panel">
            <div class="section">
                <h2>🛒 Tower Shop</h2>
                <div id="tower-shop"></div>
            </div>

            <div class="section">
                <h2>🔀 Merge Towers</h2>
                <button onclick="mergeSelected()">Merge Selected Towers (3 same type)</button>
                <small style="color:#666;display:block;margin-top:6px;">Select 3 identical towers then press merge</small>
            </div>

            <div class="section">
                <h2>📦 Packaging</h2>
                <button onclick="collectWaffles()" style="background:#2a9d8f;">Collect to Conveyor</button>
                <div id="conveyor" style="height:68px;background:#ddd;border:3px solid #264653;margin:10px 0;border-radius:8px;position:relative;overflow:hidden;">
                    <div id="conveyor-items" style="position:absolute;height:100%;display:flex;align-items:center;gap:8px;transition:left 1.8s linear;"></div>
                </div>
                <button onclick="packageWaffles()">Package → Boxes</button>
            </div>

            <div class="section">
                <h2>🚚 Delivery</h2>
                <div style="text-align:center;margin:12px 0;font-size:42px;" id="truck">🚚</div>
                <button onclick="deliverPackages()">Deliver Packages</button>
            </div>

            <div class="section">
                <h2>⚡ Upgrades</h2>
                <button onclick="upgradePackaging()">Faster Packaging (<span id="pack-cost">60</span>)</button>
                <button onclick="upgradeDelivery()">Faster Delivery (<span id="deliv-cost">120</span>)</button>
            </div>

            <div class="section">
                <h2>🏆 Leaderboards</h2>
                <select id="lb-type" onchange="showLeaderboard()" style="width:100%;padding:8px;margin-bottom:8px;">
                    <option value="money">Money</option>
                    <option value="drops">Total Drops</option>
                    <option value="towers">Total Towers</option>
                </select>
                <div id="leaderboards" style="max-height:220px;overflow:auto;"></div>
            </div>

            <div class="section">
                <h2>🥞 Waffle Types</h2>
                <div id="waffle-types" style="font-size:13px;"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let money = 150;
        let wafflesInBin = 0;
        let boxes = 0;
        let totalDrops = 0;
        let totalTowersPlaced = 0;
        let packagingSpeed = 1;
        let deliverySpeed = 1;
        
        let ownedTowers = [];
        let fallingWaffles = [];
        let conveyorWaffles = [];
        let selectedTowers = [];
        
        const MAX_BIN = 30;
        const TOWERS_PER_ROW = 6;
        let currentRows = 1;
        
        const towerTypes = [
            {id:0, name:"Basic Waffle", cost:45, dropInterval:5000, dropAmount:1, color:"#f4a261", unlocked:true},
            {id:1, name:"Syrup Drizzle", cost:180, dropInterval:3800, dropAmount:2, color:"#e76f51", unlocked:false},
            {id:2, name:"Berry Burst", cost:420, dropInterval:2600, dropAmount:3, color:"#2a9d8f", unlocked:false},
            {id:3, name:"Choco Chip", cost:780, dropInterval:1900, dropAmount:5, color:"#264653", unlocked:false},
            {id:4, name:"Deluxe Stack", cost:1450, dropInterval:1350, dropAmount:8, color:"#f4a261", unlocked:false}
        ];
        
        let lastDropTimes = {};
        
        function drawWaffle(x, y, size=1, type=0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(size, size);
            
            // Waffle base
            ctx.fillStyle = towerTypes[type].color;
            ctx.fillRect(-18, -18, 36, 36);
            
            // Grid lines
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(-18, -10); ctx.lineTo(18, -10);
            ctx.moveTo(-18, 2); ctx.lineTo(18, 2);
            ctx.moveTo(-18, 14); ctx.lineTo(18, 14);
            ctx.moveTo(-10, -18); ctx.lineTo(-10, 18);
            ctx.moveTo(2, -18); ctx.lineTo(2, 18);
            ctx.moveTo(14, -18); ctx.lineTo(14, 18);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawTower(tower) {
            const baseY = 480 - (tower.row * 110);
            const x = tower.x;
            
            // Tower body
            ctx.fillStyle = "#555";
            ctx.fillRect(x-32, baseY-90, 64, 95);
            
            // Levels
            for (let i = 0; i < tower.level; i++) {
                ctx.fillStyle = towerTypes[tower.typeId].color;
                ctx.fillRect(x-26, baseY - 78 - i*28, 52, 24);
                drawWaffle(x, baseY - 66 - i*28, 0.8, tower.typeId);
            }
            
            // Label
            ctx.fillStyle = "#222";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(towerTypes[tower.typeId].name[0], x, baseY - 105);
        }
        
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background ramp system
            ctx.fillStyle = "#e9d8a6";
            ctx.beginPath();
            ctx.moveTo(0, 520);
            ctx.quadraticCurveTo(480, 380, 960, 520);
            ctx.lineTo(960, 620);
            ctx.lineTo(0, 620);
            ctx.fill();
            
            // Towers
            ownedTowers.forEach(t => drawTower(t));
            
            // Falling waffles with realistic roll
            fallingWaffles.forEach((w, i) => {
                w.y += w.vy;
                w.vy += 0.32;
                w.x += w.vx;
                w.rotation += w.vx * 0.8;
                
                ctx.save();
                ctx.translate(w.x, w.y);
                ctx.rotate(w.rotation * Math.PI / 180);
                drawWaffle(0, 0, 1, w.type);
                ctx.restore();
                
                if (w.y > 505) {
                    if (wafflesInBin < MAX_BIN) {
                        wafflesInBin++;
                        totalDrops++;
                    }
                    fallingWaffles.splice(i, 1);
                }
            });
            
            requestAnimationFrame(gameLoop);
        }
        
        function dropFromTower(tower) {
            const baseY = 480 - (tower.row * 110) - tower.level * 25;
            fallingWaffles.push({
                x: tower.x + (Math.random() * 26 - 13),
                y: baseY,
                vx: Math.random() * 1.2 - 0.6,
                vy: 1.2,
                rotation: 0,
                type: tower.typeId
            });
        }
        
        function autoDrop() {
            const now = Date.now();
            ownedTowers.forEach(tower => {
                if (!lastDropTimes[tower.id]) lastDropTimes[tower.id] = 0;
                const interval = towerTypes[tower.typeId].dropInterval / tower.level;
                
                if (now - lastDropTimes[tower.id] > interval) {
                    dropFromTower(tower);
                    lastDropTimes[tower.id] = now;
                }
            });
        }
        
        function buyTower(id) {
            const t = towerTypes[id];
            if (money < t.cost || !t.unlocked) return;
            
            money -= t.cost;
            
            const row = Math.floor(totalTowersPlaced / TOWERS_PER_ROW);
            const col = totalTowersPlaced % TOWERS_PER_ROW;
            const x = 120 + col * 110;
            
            ownedTowers.push({
                id: Date.now(),
                typeId: id,
                level: 1,
                x: x,
                row: row
            });
            
            totalTowersPlaced++;
            if (row + 1 > currentRows) currentRows = row + 1;
            
            updateUI();
        }
        
        function selectTower(towerId) {
            const idx = selectedTowers.indexOf(towerId);
            if (idx > -1) selectedTowers.splice(idx, 1);
            else if (selectedTowers.length < 3) selectedTowers.push(towerId);
            updateUI();
        }
        
        function mergeSelected() {
            if (selectedTowers.length !== 3) return alert("Select exactly 3 towers of the same type!");
            
            const types = selectedTowers.map(id => {
                return ownedTowers.find(t => t.id === id).typeId;
            });
            
            if (!types.every(t => t === types[0])) return alert("All 3 must be the same type!");
            
            const typeId = types[0];
            const newLevel = ownedTowers.find(t => t.id === selectedTowers[0]).level + 1;
            
            // Remove old towers
            ownedTowers = ownedTowers.filter(t => !selectedTowers.includes(t.id));
            
            // Add merged tower in first available spot
            const row = Math.floor(ownedTowers.length / TOWERS_PER_ROW);
            const col = ownedTowers.length % TOWERS_PER_ROW;
            
            ownedTowers.push({
                id: Date.now(),
                typeId: typeId,
                level: newLevel,
                x: 120 + col * 110,
                row: row
            });
            
            selectedTowers = [];
            updateUI();
        }
        
        function collectWaffles() {
            if (wafflesInBin <= 0) return;
            conveyorWaffles.push(wafflesInBin);
            wafflesInBin = 0;
            updateConveyor();
        }
        
        function updateConveyor() {
            const container = document.getElementById('conveyor-items');
            container.innerHTML = '';
            conveyorWaffles.forEach((count, i) => {
                const el = document.createElement('div');
                el.style.cssText = `background:#f4a261;padding:8px 12px;border-radius:6px;min-width:48px;text-align:center;font-weight:bold;`;
                el.textContent = `🥞${count}`;
                container.appendChild(el);
            });
        }
        
        function packageWaffles() {
            if (conveyorWaffles.length === 0) return;
            const totalW = conveyorWaffles.reduce((a,b)=>a+b, 0);
            conveyorWaffles = [];
            updateConveyor();
            
            setTimeout(() => {
                boxes += Math.floor(totalW / 8) + 1;
                updateUI();
            }, 1400 / packagingSpeed);
        }
        
        function deliverPackages() {
            if (boxes <= 0) return;
            const truck = document.getElementById('truck');
            truck.style.transition = 'transform 1.6s';
            truck.style.transform = 'translateX(280px)';
            
            setTimeout(() => {
                const earned = Math.floor(boxes * 9 + Math.random() * 35);
                money += earned;
                boxes = 0;
                truck.style.transform = 'translateX(0)';
                updateUI();
                
                const popup = document.createElement('div');
                popup.className = 'popup';
                popup.style.left = '420px';
                popup.style.top = '180px';
                popup.style.color = '#2a9d8f';
                popup.textContent = `+$${earned}`;
                document.getElementById('game-area').appendChild(popup);
                setTimeout(() => popup.remove(), 2000);
            }, 1600 / deliverySpeed);
        }
        
        function upgradePackaging() {
            const cost = parseInt(document.getElementById('pack-cost').textContent);
            if (money >= cost) {
                money -= cost;
                packagingSpeed = Math.max(0.6, packagingSpeed * 0.82);
                document.getElementById('pack-cost').textContent = Math.floor(cost * 1.7);
                updateUI();
            }
        }
        
        function upgradeDelivery() {
            const cost = parseInt(document.getElementById('deliv-cost').textContent);
            if (money >= cost) {
                money -= cost;
                deliverySpeed = Math.max(0.6, deliverySpeed * 0.78);
                document.getElementById('deliv-cost').textContent = Math.floor(cost * 1.85);
                updateUI();
            }
        }
        
        function updateUI() {
            document.getElementById('money').textContent = Math.floor(money);
            document.getElementById('waffles-bin').textContent = wafflesInBin;
            document.getElementById('boxes').textContent = boxes;
            
            // Shop
            let shopHTML = '';
            towerTypes.forEach(t => {
                if (!t.unlocked) return;
                shopHTML += `
                    <button onclick="buyTower(${t.id})" style="margin-bottom:8px;">
                        ${t.name}<br>
                        <small>$${t.cost} | ${t.dropAmount} waffles every ~${(t.dropInterval/1000).toFixed(1)}s</small>
                    </button>`;
            });
            document.getElementById('tower-shop').innerHTML = shopHTML;
            
            // Waffle types
            let typesHTML = '';
            towerTypes.forEach(t => {
                typesHTML += `<div style="padding:6px 0;border-bottom:1px solid #eee;">${t.name} — unlocked: ${t.unlocked ? '✅' : '🔒'}</div>`;
            });
            document.getElementById('waffle-types').innerHTML = typesHTML;
        }
        
        function showLeaderboard() {
            const type = document.getElementById('lb-type').value;
            const demoData = {
                money: [{n:"WaffleKing", s:24500}, {n:"StackLord", s:18200}, {n:"BerryBoss", s:9700}],
                drops: [{n:"DropGod", s:12400}, {n:"RainMaker", s:8900}, {n:"WaffleStorm", s:6200}],
                towers: [{n:"EmpireBuilder", s:68}, {n:"TowerMaster", s:51}, {n:"MegaFarm", s:37}]
            };
            
            let html = '<ol>';
            demoData[type].forEach(l => html += `<li>${l.n} — ${l.s}</li>`);
            html += '</ol>';
            document.getElementById('leaderboards').innerHTML = html;
        }
        
        // Init
        window.onload = () => {
            // Starter tower
            ownedTowers = [{
                id: 1,
                typeId: 0,
                level: 1,
                x: 280,
                row: 0
            }];
            totalTowersPlaced = 1;
            
            updateUI();
            showLeaderboard();
            gameLoop();
            
            // Game ticks
            setInterval(autoDrop, 180);
            setInterval(() => {
                if (Math.random() < 0.4) updateUI();
            }, 1200);
            
            // Unlock next tower after some progress
            setTimeout(() => {
                if (money > 300) towerTypes[1].unlocked = true;
                updateUI();
            }, 45000);
        };
    </script>
</body>
</html>
